name: 'Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # NOTE: macOS/Linux builds are temporarily disabled due to PTY-related compilation issues.
          # To re-enable, add the following entries and fix `portable-pty` Sync constraints in claude_runner.rs:
          #   - platform: 'macos-latest'
          #     args: '--target x86_64-apple-darwin'
          #   - platform: 'macos-latest'
          #     args: '--target aarch64-apple-darwin'
          #   - platform: 'ubuntu-22.04'
          #     args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Read release notes
        id: release_notes
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          NOTES_FILE="releases/${TAG_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            # GitHub Actions multiline output
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat "$NOTES_FILE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=See the assets to download and install vicara." >> $GITHUB_OUTPUT
          fi

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'vicara v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

